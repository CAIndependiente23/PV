<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generador PV</title>

<style>
body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f3f5f7}
header{background:#1f4e79;color:#fff;padding:14px 20px}
.container{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:16px}
.panel{background:#fff;border-radius:8px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.section{border-top:1px solid #ddd;padding-top:8px;margin-top:8px}
label{display:block;font-weight:600;margin-top:8px}
input,select,textarea{width:100%;box-sizing:border-box;padding:8px}
.preview{height:85vh;font-family:Calibri,Arial,sans-serif;line-height:1.5}
button{padding:10px 12px;margin-top:8px}
</style>
</head>

<body>
<header><h2>Generador PV</h2></header>

<div class="container">

<div class="panel">

<div class="section">
<h3>Datos</h3>
<label>Expediente</label><input id="expediente">
<label>Certificado N°</label><input id="certificado">
<label>Mes</label><input id="mes" value="MAYO">
<label>Año</label><input id="anio" value="2026">
</div>

<div class="section">
<h3>Informes</h3>
<label>IF Certificado</label><input id="ifCert">
<label>IF Elevación</label><input id="ifElev">
<label>IF SAP</label><input id="ifSap">
</div>

<div class="section">
<h3>Montos</h3>
<label>Monto Básico</label><input id="montoBasico">
<label>Monto Redeterminado</label><input id="montoRedet">
</div>

<button onclick="generar()">Generar</button>
<button onclick="copiar()">Copiar</button>

</div>

<div class="panel">
<textarea id="resultado" class="preview"></textarea>
</div>

</div>

<script>

function numeroALetras(v){
if(!v) return "PESOS CERO CON 00/100";
const n=parseFloat(String(v).replace(/[$.]/g,'').replace(',','.'));
if(isNaN(n)) return "PESOS CERO CON 00/100";
const e=Math.floor(n), d=Math.round((n-e)*100);
return "PESOS "+e+" CON "+String(d).padStart(2,'0')+"/100";
}

function generar(){

const expediente=document.getElementById("expediente").value||"";
const certificado=document.getElementById("certificado").value||"";
const mes=document.getElementById("mes").value||"";
const anio=document.getElementById("anio").value||"";
const ifCert=document.getElementById("ifCert").value||"";
const ifElev=document.getElementById("ifElev").value||"";
const ifSap=document.getElementById("ifSap").value||"";
const monto=document.getElementById("montoBasico").value||"";
const redet=document.getElementById("montoRedet").value||"";

const texto = `S/ ${expediente} - Certificado Básico N° ${certificado} - ${mes} ${anio} - Z3

DIRECCIÓN GENERAL TÉCNICA, ADMINISTRATIVA Y LEGAL

Por las presentes actuaciones tramita el Certificado Básico N° ${certificado}, correspondiente a los trabajos realizados durante el mes de mayo de 2026 por la empresa Automat Argentina S.A. (CUIT N° 30-57847579-6) en el marco de la Licitación Pública N° 7162-0734-LPU21, del “Servicio de Mantenimiento Integral de la Red Pluvial y Tareas Correctivas”, que tramitó por el Expediente Electrónico N° 15676966-GCABA-DGTALMEPHU/21.
En tal sentido, en el expediente se adjunta el Certificado N° ${certificado}, en el orden 4, el que luce como Informe N° ${ifCert}, el cual asciende a la suma de ${numeroALetras(monto)} (${monto}), correspondiente a las tareas de mantenimiento detalladas en el Informe mencionado.
Cabe mencionar que durante el mes se llevó a cabo la verificación y control de las tareas realizadas, conforme a los Planes de Mantenimiento ejecutados por la empresa contratista, siguiendo lo establecido en el Pliego de Especificaciones Técnicas y las reglas del buen arte, de conformidad con lo informado por el Gerente Operativo de la Gerencia Operativa de Mantenimiento, bajo el Informe N° ${ifElev}.
Asimismo, se informa que el monto mencionado surge del detalle de liquidación del sistema SAP (Systemanalyse Programmentwicklung), el cual se vinculó al Expediente de referencia mediante el Informe N° ${ifSap}.
En este sentido, corresponde señalar que por Resolución 281-MEPHUGC/26 se aprobó el Acta Acuerdo de la primera a vigésima sexta (1° a 26°) Redeterminación Definitiva de Precios suscripta, en el marco de la Ley 2.809, entre este Ministerio de Espacio Público e Higiene Urbana y la empresa AUTOMAT ARGENTINA S.A., adjudicataria de la Zona 3 de la Licitación Pública de Etapa Múltiple 7162-0734-LPU21, referida al “Servicio de Mantenimiento Integral de la Red Pluvial y Tareas Correctivas” por el monto antes mencionado.
Asimismo, se aprobaron las Redeterminaciones Provisorias de precios del servicio, por un total de ${numeroALetras(redet)} (${redet}), mediante las resoluciones N° 1953-MHFGC/25, 2498-MHFGC/25, 0734-MHFGC/25, 4985-MHFGC/25 y 1560-MHFGC/26.
Por otra parte, en virtud de lo estipulado en el artículo N° 60 del Pliego de Bases y Condiciones Particulares de la licitación que nos ocupa, solicitamos se efectúe la retención del 0,7% sobre el monto total correspondiente al servicio básico y a sus valores redeterminados.
Atento a lo expuesto, esta Dirección General presta conformidad al monto básico de ${numeroALetras(monto)} (${monto}) y su monto redeterminado de ${numeroALetras(redet)} (${redet}), por lo que se envían las presentes para la aprobación del Certificado N° ${certificado} y la ejecución de la retención solicitada.

Saludo a Ud. atentamente.`;

document.getElementById("resultado").value = texto;
}

function copiar(){
navigator.clipboard.writeText(document.getElementById("resultado").value||"");
}

</script>

</body>
</html>
