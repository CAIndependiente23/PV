<!DOCTYPE html>

<html lang="es"> <head> <meta charset="UTF-8"> <title>Generador Certificados Pluviales</title>

<style> body{ font-family: Arial, sans-serif; max-width:1200px; margin:20px auto; padding:20px; } label{ display:block; margin-top:10px; font-weight:bold; } input, select{ width:100%; padding:8px; box-sizing:border-box; } button{ margin-top:15px; padding:10px 20px; cursor:pointer; } textarea{ width:100%; height:600px; margin-top:20px; } </style>

</head> <body>

<h2>Generador de Elevación Certificados Pluviales</h2>

<label>Expediente</label>
<input id="expediente" placeholder="EX-2026-26993820-GCABA-DGSPLU">

<label>Certificado Nº</label>
<input id="certificado" placeholder="56">

<label>Mes</label>
<input id="mes" placeholder="MAYO">

<label>Año</label>
<input id="anio" value="2026">

<label>Zona</label>
<select id="zona">

<option value="1">Zona 1</option> <option value="2">Zona 2</option> <option value="3">Zona 3</option> <option value="4">Zona 4</option> <option value="5">Zona 5</option> </select>

<label>IF Certificado</label>
<input id="ifcert" placeholder="IF-2026-28127174-GCABA-DGSPLU">

<label>IF Elevación</label>
<input id="ifelev" placeholder="IF-2026-28189228-GCABA-DGSPLU">

<label>IF SAP</label>
<input id="ifsap" placeholder="IF-2026-28067255-GCABA-DGSPLU">

<label>Resolución Definitiva</label>
<input id="resolucion" placeholder="281-MEPHUGC/26">

<label>Monto Básico (número)</label>
<input id="montobasico" placeholder="$402.868.375,48">

<label>Monto Básico (letras)</label>
<input id="basicoletras" placeholder="PESOS CUATROCIENTOS DOS MILLONES...">

<label>Monto Redeterminado (número)</label>
<input id="montoredet" placeholder="$128.754.893,27">

<label>Monto Redeterminado (letras)</label>
<input id="redetletras" placeholder="PESOS CIENTO VEINTIOCHO MILLONES...">

<button onclick="generar()">Generar</button>
<button onclick="copiar()">Copiar</button>

<textarea id="resultado"></textarea>

<script> const cuits = { 1:"30-71731123-6", 2:"30-67779097-7", 3:"30-57847579-6", 4:"30-71726938-8", 5:"30-71730593-7" }; function generar(){ const expediente=document.getElementById("expediente").value; const certificado=document.getElementById("certificado").value; const mes=document.getElementById("mes").value; const anio=document.getElementById("anio").value; const zona=document.getElementById("zona").value; const ifcert=document.getElementById("ifcert").value; const ifelev=document.getElementById("ifelev").value; const ifsap=document.getElementById("ifsap").value; const resolucion=document.getElementById("resolucion").value; const montobasico=document.getElementById("montobasico").value; const basicoletras=document.getElementById("basicoletras").value; const montoredet=document.getElementById("montoredet").value; const redetletras=document.getElementById("redetletras").value; const cuit=cuits[zona]; const texto = `S/ ${expediente} - Certificado Básico N°${certificado} - ${mes} ${anio} - Zona ${zona} DIRECCIÓN GENERAL TÉCNICA, ADMINISTRATIVA Y LEGAL Por las presentes actuaciones tramita el Certificado Básico N°${certificado}, correspondiente a los trabajos realizados durante el mes de ${mes.toLowerCase()} de ${anio} por la empresa Automat Argentina S.A. (CUIT N° ${cuit}) en el marco de la Licitación Pública N° 7162-0734-LPU21, del “Servicio de Mantenimiento Integral de la Red Pluvial y Tareas Correctivas”, que tramitó por el Expediente Electrónico N° 15676966-GCABA-DGTALMEPHU/21. En tal sentido, en el expediente se adjunta el Certificado N°${certificado}, en el orden correspondiente, el que luce como Informe N° ${ifcert}, el cual asciende a la suma de ${basicoletras} (${montobasico}), correspondiente a las tareas de mantenimiento detalladas en el Informe mencionado. Cabe mencionar que durante el mes se llevó a cabo la verificación y control de las tareas realizadas, conforme a los Planes de Mantenimiento ejecutados por la empresa contratista, siguiendo lo establecido en el Pliego de Especificaciones Técnicas y las reglas del buen arte, de conformidad con lo informado por el Gerente Operativo de la Gerencia Operativa de Mantenimiento, bajo el Informe N° ${ifelev}. Asimismo, se informa que el monto mencionado surge del detalle de liquidación del sistema SAP (Systemanalyse Programmentwicklung), el cual se vinculó al Expediente de referencia mediante el Informe N° ${ifsap}. En este sentido, corresponde señalar que por Resolución ${resolucion} se aprobó el Acta Acuerdo de la primera a vigésima sexta (1° a 26°) Redeterminación Definitiva de Precios suscripta, en el marco de la Ley 2.809, entre este Ministerio de Espacio Público e Higiene Urbana y la empresa AUTOMAT ARGENTINA S.A., adjudicataria de la Zona ${zona} de la Licitación Pública de Etapa Múltiple 7162-0734-LPU21, referida al “Servicio de Mantenimiento Integral de la Red Pluvial y Tareas Correctivas” por el monto antes mencionado. Asimismo, se aprobaron las Redeterminaciones Provisorias de precios del servicio, por un total de ${redetletras} (${montoredet}), mediante las resoluciones N° 1953-MHFGC/25, 2498-MHFGC/25, 0734-MHFGC/25, 4985-MHFGC/25 y 1560-MHFGC/26. Por otra parte, en virtud de lo estipulado en el artículo N° 60 del Pliego de Bases y Condiciones Particulares de la licitación que nos ocupa, solicitamos se efectúe la retención del 0,7% sobre el monto total correspondiente al servicio básico y a sus valores redeterminados. Atento a lo expuesto, esta Dirección General presta conformidad al monto básico de ${basicoletras} (${montobasico}) y su monto redeterminado de ${redetletras} (${montoredet}), por lo que se envían las presentes para la aprobación del Certificado N° ${certificado} y la ejecución de la retención solicitada. Saludo a Ud. atentamente.-`; document.getElementById("resultado").value = texto; } function copiar(){ const texto=document.getElementById("resultado"); texto.select(); document.execCommand("copy"); alert("Texto copiado"); } </script>

</body> </html>
