<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generador PV</title>

<style>
body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f3f5f7}
header{background:#1f4e79;color:#fff;padding:14px 20px}
.container{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:16px}
.panel{background:#fff;border-radius:8px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.section{border-top:1px solid #ddd;padding-top:8px;margin-top:8px}
label{display:block;font-weight:600;margin-top:8px}
input,select,textarea{width:100%;box-sizing:border-box;padding:8px}
.preview{height:85vh;font-family:Calibri,Arial,sans-serif;line-height:1.5}
button{padding:10px 12px;margin-top:8px}
</style>
</head>

<body>
<header><h2>Generador PV</h2></header>

<div class="container">

<div class="panel">

<div class="section">
<h3>Datos</h3>
<label>Expediente</label><input id="expediente">
<label>Certificado N°</label><input id="certificado">
<label>Mes</label><input id="mes" value="MAYO">
<label>Año</label><input id="anio" value="2026">
<label>Zona</label>
<select id="zona">
<option value="Z1">Zona 1</option>
<option value="Z2">Zona 2</option>
<option value="Z3">Zona 3</option>
<option value="Z4">Zona 4</option>
<option value="Z5">Zona 5</option>
</select>
</div>

<div class="section">
<h3>Informes</h3>
<label>IF Certificado</label><input id="ifCert">
<label>IF Elevación</label><input id="ifElev">
<label>IF SAP</label><input id="ifSap">
</div>

<div class="section">
<h3>Montos</h3>
<label>Monto Básico</label><input id="montoBasico">
<label>Monto Redeterminado</label><input id="montoRedet">
</div>

<button onclick="generar()">Generar</button>
<button onclick="copiar()">Copiar</button>

</div>

<div class="panel">
<textarea id="resultado" class="preview"></textarea>
</div>

</div>

<script>

function numeroALetras(v){
if(!v) return "PESOS CERO CON 00/100";

const n = parseFloat(String(v).replace(/[$.]/g,'').replace(',','.'));
if(isNaN(n)) return "PESOS CERO CON 00/100";

const entero = Math.floor(n);
const dec = Math.round((n - entero) * 100);

function unidades(x){
return ["","UNO","DOS","TRES","CUATRO","CINCO","SEIS","SIETE","OCHO","NUEVE"][x] || "";
}

function especiales(num){
if(num===10) return "DIEZ";
if(num===11) return "ONCE";
if(num===12) return "DOCE";
if(num===13) return "TRECE";
if(num===14) return "CATORCE";
if(num===15) return "QUINCE";
return "";
}

function convertir(num){

if(num===0) return "";

if(especiales(num)) return especiales(num);

if(num<10) return unidades(num);

if(num<20) return "DIECI"+unidades(num-10);

if(num<30) return num===20 ? "VEINTE" : "VEINTI"+unidades(num-20);

const decenas=["","","VEINTE","TREINTA","CUARENTA","CINCUENTA","SESENTA","SETENTA","OCHENTA","NOVENTA"];

if(num<100){
let d=Math.floor(num/10);
let u=num%10;
return decenas[d] + (u ? " Y "+unidades(u) : "");
}

const centenas=["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];

if(num===100) return "CIEN";

if(num<1000){
let c=Math.floor(num/100);
let r=num%100;
return centenas[c] + (r ? " "+convertir(r) : "");
}

if(num<1000000){
let miles=Math.floor(num/1000);
let resto=num%1000;

let milesTexto = miles===1 ? "MIL" : convertir(miles)+" MIL";

return milesTexto + (resto ? " "+convertir(resto) : "");
}

if(num<1000000000000){
let millones=Math.floor(num/1000000);
let resto=num%1000000;

let millonTexto = millones===1 ? "UN MILLON" : convertir(millones)+" MILLONES";

return millonTexto + (resto ? " "+convertir(resto) : "");
}

return "";
}

return "PESOS "+convertir(entero)+" CON "+String(dec).padStart(2,"0")+"/100";
}

function generar(){

const exp=document.getElementById("expediente").value||"";
const cert=document.getElementById("certificado").value||"";
const mes=document.getElementById("mes").value||"";
const anio=document.getElementById("anio").value||"";
const zona=document.getElementById("zona").value;

const ifCert=document.getElementById("ifCert").value||"";
const ifElev=document.getElementById("ifElev").value||"";
const ifSap=document.getElementById("ifSap").value||"";

const monto=document.getElementById("montoBasico").value||"";
const redet=document.getElementById("montoRedet").value||"";

document.getElementById("resultado").value =

`S/ ${exp} - Certificado Básico N° ${cert} - ${mes} ${anio} - ${zona}

DIRECCIÓN GENERAL TÉCNICA, ADMINISTRATIVA Y LEGAL

Por las presentes actuaciones tramita el Certificado Básico N° ${cert}, correspondiente a los trabajos realizados durante el mes de ${mes} de ${anio} por la empresa AUTOMAT ARGENTINA S.A.

En tal sentido, en el expediente se adjunta el Certificado N° ${cert}, en el orden 4, el que luce como Informe N° ${ifCert}, el cual asciende a la suma de ${numeroALetras(monto)} (${monto}), correspondiente a las tareas ejecutadas.

Cabe mencionar que durante el mes se llevó a cabo la verificación y control de las tareas realizadas, bajo el Informe N° ${ifElev}.

Asimismo, se informa que el monto mencionado surge del sistema SAP (Systemanalyse Programmentwicklung), mediante Informe N° ${ifSap}.

En este sentido, corresponde señalar que se aprobaron las actuaciones correspondientes.

Asimismo, se aprobaron las Redeterminaciones Provisorias por un total de ${numeroALetras(redet)} (${redet}).

Atento a lo expuesto, esta Dirección presta conformidad.

Saludo a Ud. atentamente.`;
}

function copiar(){
navigator.clipboard.writeText(document.getElementById("resultado").value||"");
}

</script>

</body>
</html>
