function actualizarMontos(){

numeroALetras(document.getElementById("montoRedetNumero").value);

document.getElementById("montoCertificadoAcumarNumero");

if(certAcumar){
document.getElementById("montoCertificadoAcumarLetras").value =
numeroALetras(certAcumar.value);
}

const redetAcumar =
document.getElementById("montoRedetAcumarNumero");

if(redetAcumar){
document.getElementById("montoRedetAcumarLetras").value =
numeroALetras(redetAcumar.value);
}

}

function numeroALetras(valor){

valor = valor.replace(/\$/g,'').replace(/\./g,'').replace(',','.');
let n = parseFloat(valor);
if(isNaN(n)) return "";

let entero = Math.floor(n);
let dec = Math.round((n-entero)*100);

return ("PESOS " + convertir(entero) + " CON " +
String(dec).padStart(2,'0') + "/100").toUpperCase();
}

function convertir(n){

const u=["","UN","DOS","TRES","CUATRO","CINCO","SEIS","SIETE","OCHO","NUEVE"];
const d=["","DIEZ","VEINTE","TREINTA","CUARENTA","CINCUENTA","SESENTA","SETENTA","OCHENTA","NOVENTA"];
const e={11:"ONCE",12:"DOCE",13:"TRECE",14:"CATORCE",15:"QUINCE"};

function c99(x){

const especiales = {
10:"DIEZ",
11:"ONCE",
12:"DOCE",
13:"TRECE",
14:"CATORCE",
15:"QUINCE",
16:"DIECISEIS",
17:"DIECISIETE",
18:"DIECIOCHO",
19:"DIECINUEVE",
20:"VEINTE",
21:"VEINTIUN",
22:"VEINTIDOS",
23:"VEINTITRES",
24:"VEINTICUATRO",
25:"VEINTICINCO",
26:"VEINTISEIS",
27:"VEINTISIETE",
28:"VEINTIOCHO",
29:"VEINTINUEVE"
};

if(x < 30) return especiales[x] || u[x];

let dec=Math.floor(x/10);
let uni=x%10;

return d[dec] + (uni ? " Y " + u[uni] : "");

}

function c999(x){
if(x===0) return "";
if(x===100) return "CIEN";
const cen=["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];
let c=Math.floor(x/100), r=x%100;
return (c?cen[c]+" ":"")+c99(r);
}

let millones=Math.floor(n/1000000);
let miles=Math.floor((n%1000000)/1000);
let resto=n%1000;

let txt="";
if(millones===1) txt+="UN MILLON ";
else if(millones>1) txt+=c999(millones)+" MILLONES ";

if(miles===1) txt+="MIL ";
else if(miles>1) txt+=c999(miles)+" MIL ";

txt+=c999(resto);

return txt.trim();
}
