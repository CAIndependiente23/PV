<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Generador PV</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px}
h1{text-align:center}
.container{display:grid;grid-template-columns:380px 1fr;gap:20px}
.panel{background:#fff;padding:15px;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,.15)}
label{display:block;margin-top:8px;font-weight:bold}
input,select,textarea{width:100%;box-sizing:border-box;padding:8px}
#preview{height:80vh}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
button{padding:10px}
.small{background:#eef;padding:8px;border-radius:6px;margin-top:10px}
</style>
</head>
<body>
<h1>Generador PV</h1>

<div class="container">
<div class="panel">
<label>Certificado</label><input id="certificado" value="56">
<label>Zona</label>
<select id="zona">
<option>Z1</option><option>Z2</option><option selected>Z3</option><option>Z4</option><option>Z5</option>
</select>

<div class="small">
<div><b>Empresa:</b> <span id="empresa"></span></div>
<div><b>CUIT:</b> <span id="cuit"></span></div>
</div>

<label>Mes</label><input id="mes" value="MAYO">
<label>Año</label><input id="anio" value="2026">
<label>Expediente</label><input id="expediente">
<label>IF Certificado</label><input id="ifCertificado">
<label>IF Elevación</label><input id="ifElevacion">
<label>IF SAP</label><input id="ifSAP">

<label>Monto Básico ($)</label><input id="montoBasico">
<label>Monto Redeterminado ($)</label><input id="montoRedet">

<div class="buttons">
<button onclick="copiar()">Copiar</button>
<button onclick="exportar()">Exportar Word</button>
<button onclick="limpiar()">Limpiar</button>
</div>
</div>

<div class="panel">
<textarea id="preview"></textarea>
</div>
</div>

<script>
const zonas={
Z1:{empresa:"SOLUCIONES QUÍMICAS S.A., OS.LO. ARGENTINA S.A., MANTELECTRIC I.C.I.S.A. U.T.",cuit:"30-71731123-6",resDef:"377-MEPHUGC/26",resProv:"5757-MHFGC/21 ... 1551-MHFGC/26",red:"primera a vigésima séptima (1° a 27°)"},
Z2:{empresa:"RECONSTRUCCIÓN CAÑOS S.A.",cuit:"30-67779097-7",resDef:"282-MEPHUGC/26",resProv:"1952-MHFGC/25, 2883-MHFGC/25, 4029-MHFGC/25, 4984-MHFGC/25 y 1608-MHFGC/26",red:"primera a vigésima sexta (1° a 26°)"},
Z3:{empresa:"AUTOMAT ARGENTINA S.A.",cuit:"30-57847579-6",resDef:"281-MEPHUGC/26",resProv:"1953-MHFGC/25, 2498-MHFGC/25, 0734-MHFGC/25, 4985-MHFGC/25 y 1560-MHFGC/26",red:"primera a vigésima sexta (1° a 26°)"},
Z4:{empresa:"DESOBSTRUCTORA ARGENTINA S.A.-ASHIRA S.A. U.T.",cuit:"30-71726938-8",resDef:"376-MEPHUGC/26",resProv:"407-MHFGC/22 ... 1554-MHFGC/26",red:"primera a vigésima tercera (1° a 23°)"},
Z5:{empresa:"ALEMARSA S.A.-SACH S.A.-MANTENIMIENTOS AMBIENTALES S.A. U.T.",cuit:"30-71730593-7",resDef:"378-MEPHUGC/26",resProv:"430-MHFGC/22 ... 436-MHFGC/26",red:"primera a vigésima sexta (1° a 26°)"}
};

function numeroALetrasDummy(v){return "PESOS "+v;}
function act(){
 const z=zonas[zona.value];
 empresa.textContent=z.empresa;
 cuit.textContent=z.cuit;

 const txt=`S/ ${expediente.value} - Certificado Básico N°${certificado.value} - ${mes.value} ${anio.value} - ${zona.value.replace('Z','Zona ')}

DIRECCIÓN GENERAL TÉCNICA, ADMINISTRATIVA Y LEGAL

Por las presentes actuaciones tramita el Certificado Básico N° ${certificado.value}, correspondiente a los trabajos realizados durante el mes de ${mes.value.toLowerCase()} de ${anio.value} por la empresa ${z.empresa} (CUIT N° ${z.cuit}), en el marco de la Licitación Pública N° 7162-0734-LPU21.

En tal sentido, se incorpora al expediente el Certificado N° ${certificado.value}, obrante bajo Informe N° ${ifCertificado.value}, correspondiente a las tareas de mantenimiento ejecutadas durante el período.

Asimismo, se deja constancia de que las tareas fueron verificadas y controladas conforme surge del Informe N° ${ifElevacion.value}.

Por otra parte, se informa que el importe certificado surge de la liquidación efectuada mediante el sistema SAP, vinculada mediante el Informe N° ${ifSAP.value}.

Cabe señalar que mediante Resolución N° ${z.resDef} se aprobó el Acta Acuerdo correspondiente a la ${z.red} Redeterminación Definitiva de Precios suscripta entre este Ministerio y la empresa ${z.empresa}.

Asimismo, mediante las Resoluciones Nros. ${z.resProv}, se aprobaron las redeterminaciones provisorias de precios del servicio.

En virtud de lo dispuesto en el artículo 60 del Pliego de Bases y Condiciones Particulares, corresponde efectuar la retención del 0,7 % sobre el monto total del servicio básico y de sus valores redeterminados.

Por lo expuesto, esta Dirección General presta conformidad al monto básico de ${montoBasico.value} y al monto correspondiente a las redeterminaciones de precios por ${montoRedet.value}, remitiéndose las presentes actuaciones para la aprobación del Certificado N° ${certificado.value} y la ejecución de la retención indicada.

Saludo a Ud. atentamente.`;

 preview.value=txt;
 localStorage.setItem("pvdata",JSON.stringify(Object.fromEntries([...document.querySelectorAll('input,select')].map(e=>[e.id,e.value]))));
}
function copiar(){navigator.clipboard.writeText(preview.value);}
function limpiar(){localStorage.clear();location.reload();}
function exportar(){
 const blob=new Blob([preview.value],{type:'application/msword'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='Generador_PV.doc';
 a.click();
}
document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',act));
const d=JSON.parse(localStorage.getItem("pvdata")||"{}");
for(const k in d){const el=document.getElementById(k); if(el) el.value=d[k];}
act();
</script>
</body>
</html>
